<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>踩点上班 - 精准通勤计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 0.85rem;
            color: #00d9ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .time-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .time-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            font-family: 'SF Mono', monospace;
        }
        
        .time-input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .segment {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .segment:last-child {
            border-bottom: none;
        }
        
        .segment-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        
        .segment-icon.walk { background: #4ade80; }
        .segment-icon.metro { background: #3b82f6; }
        .segment-icon.wait { background: #f59e0b; }
        .segment-icon.light { background: #ef4444; }
        
        .segment-info {
            flex: 1;
        }
        
        .segment-name {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        
        .segment-desc {
            font-size: 0.75rem;
            color: #666;
        }
        
        .segment-time {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .segment-time input {
            width: 60px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 8px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }
        
        .segment-time input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .segment-time span {
            color: #666;
            font-size: 0.8rem;
        }
        
        .result-card {
            background: linear-gradient(135deg, #00d9ff20, #00ff8820);
            border: 1px solid #00d9ff50;
        }
        
        .result-main {
            text-align: center;
            padding: 20px 0;
        }
        
        .result-label {
            font-size: 0.85rem;
            color: #00d9ff;
            margin-bottom: 8px;
        }
        
        .result-time {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'SF Mono', monospace;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .result-detail {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }
        
        .countdown {
            text-align: center;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 16px;
        }
        
        .countdown-label {
            font-size: 0.8rem;
            color: #666;
        }
        
        .countdown-time {
            font-size: 1.5rem;
            font-family: 'SF Mono', monospace;
            margin-top: 4px;
        }
        
        .countdown-time.urgent {
            color: #ef4444;
            animation: pulse 1s infinite;
        }
        
        .countdown-time.ok {
            color: #4ade80;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .traffic-light {
            margin-top: 16px;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .light-config {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .light-input {
            flex: 1;
        }
        
        .light-input label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 4px;
        }
        
        .light-input input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 8px;
            color: #fff;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .light-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .light-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #333;
        }
        
        .light-indicator.red.active { background: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .light-indicator.green.active { background: #4ade80; box-shadow: 0 0 20px #4ade80; }
        
        .light-text {
            font-size: 0.9rem;
        }
        
        .add-segment {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #666;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .add-segment:hover {
            background: rgba(255,255,255,0.1);
            border-color: #00d9ff;
            color: #00d9ff;
        }
        
        .total-time {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .total-label {
            color: #888;
        }
        
        .total-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-save:hover {
            opacity: 0.9;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.2rem;
        }
        
        .delete-btn:hover {
            color: #ef4444;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #444;
            font-size: 0.8rem;
        }

        .metro-selector {
            margin-top: 12px;
        }

        .metro-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .metro-row select {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .metro-row select:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .metro-row select option {
            background: #1a1a2e;
            color: #fff;
        }

        .metro-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
        }

        .metro-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .metro-info-row:last-child {
            margin-bottom: 0;
        }

        .metro-info-label {
            color: #888;
        }

        .metro-info-value {
            color: #3b82f6;
            font-weight: 500;
        }

        .metro-apply-btn {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .metro-apply-btn:hover {
            background: #2563eb;
        }

        .metro-apply-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .schedule-info {
            font-size: 0.75rem;
            color: #666;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .schedule-info span {
            display: block;
            margin-bottom: 2px;
        }

        .swap-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #00d9ff;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            background: rgba(0, 217, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⏱️ 踩点上班</h1>
            <p class="subtitle">精确到秒的通勤计算器</p>
        </header>
        
        <div class="card">
            <div class="card-title">🎯 目标到达时间</div>
            <div class="time-input-group">
                <input type="time" class="time-input" id="targetTime" value="09:00">
            </div>
        </div>

        <div class="card">
            <div class="card-title">🚇 上海地铁时刻表</div>
            <div class="metro-selector">
                <div class="metro-row">
                    <select id="metroLine" onchange="onLineChange()">
                        <option value="">选择线路</option>
                    </select>
                </div>
                <div class="metro-row">
                    <select id="metroStart" onchange="onStationChange()">
                        <option value="">起点站</option>
                    </select>
                    <button class="swap-btn" onclick="swapStations()" title="交换起终点">⇆</button>
                    <select id="metroEnd" onchange="onStationChange()">
                        <option value="">终点站</option>
                    </select>
                </div>
                <div class="metro-info" id="metroInfo" style="display: none;">
                    <div class="metro-info-row">
                        <span class="metro-info-label">站数</span>
                        <span class="metro-info-value" id="stationCount">-</span>
                    </div>
                    <div class="metro-info-row">
                        <span class="metro-info-label">预计时间</span>
                        <span class="metro-info-value" id="estimatedTime">-</span>
                    </div>
                    <div class="schedule-info" id="scheduleInfo"></div>
                </div>
                <button class="metro-apply-btn" id="metroApplyBtn" onclick="applyMetroTime()" disabled>
                    📥 填入地铁时间到路段配置
                </button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">🚶 通勤路段配置</div>
            <div id="segments"></div>
            <div class="total-time">
                <span class="total-label">总通勤时间</span>
                <span class="total-value" id="totalTime">0 分钟</span>
            </div>
            <button class="add-segment" onclick="addSegment()">+ 添加路段</button>
        </div>
        
        <div class="card">
            <div class="card-title">🚦 红绿灯配置（可选）</div>
            <div class="traffic-light">
                <div class="light-config">
                    <div class="light-input">
                        <label>红灯时长（秒）</label>
                        <input type="number" id="redDuration" value="60" onchange="saveConfig()">
                    </div>
                    <div class="light-input">
                        <label>绿灯时长（秒）</label>
                        <input type="number" id="greenDuration" value="30" onchange="saveConfig()">
                    </div>
                </div>
                <div class="light-input" style="margin-bottom: 12px;">
                    <label>上次看到绿灯的时间（用于校准）</label>
                    <input type="time" id="lastGreenTime" step="1" onchange="saveConfig()">
                </div>
                <div class="light-status">
                    <div class="light-indicator red" id="redLight"></div>
                    <div class="light-indicator green" id="greenLight"></div>
                    <span class="light-text" id="lightText">等待校准...</span>
                </div>
            </div>
        </div>
        
        <div class="card result-card">
            <div class="result-main">
                <div class="result-label">🚪 最晚出门时间</div>
                <div class="result-time" id="leaveTime">--:--</div>
                <div class="result-detail" id="resultDetail">配置你的通勤路段</div>
            </div>
            <div class="countdown">
                <div class="countdown-label">距离出门还有</div>
                <div class="countdown-time ok" id="countdown">--:--:--</div>
            </div>
        </div>
        
        <button class="btn-save" onclick="saveConfig()">💾 保存配置</button>
        
        <footer>
            <p>Made with ❤️ by Javis</p>
            <p style="margin-top: 4px;">数据保存在本地浏览器 | 地铁数据来源：上海地铁官网</p>
        </footer>
    </div>
    
    <script src="metro-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
